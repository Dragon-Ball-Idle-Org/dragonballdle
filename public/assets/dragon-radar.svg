<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Dragon Radar - Premium Bottom Nav FAB Icon (Center Style) -->
  <defs>
    <!-- Modern Metallic Body Gradient (Polished Silver) -->
    <radialGradient id="casePremium" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#cbd5e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </radialGradient>
    
    <!-- Screen: Deep Emerald with Vibrant Center -->
    <radialGradient id="screenPremium" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#064e3b;stop-opacity:1" />
    </radialGradient>
    
    <!-- Shadow/Elevation Filter -->
    <filter id="fabShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.3" />
    </filter>

    <!-- Signal Glow Filter -->
    <filter id="signalGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Main Action Button Container -->
  <g filter="url(#fabShadow)">
    
    <!-- Top Knob (The Button) -->
    <g transform="translate(64, 18)">
      <rect x="-12" y="-14" width="24" height="12" rx="3" fill="#fbbf24" stroke="#92400e" stroke-width="1.5" />
      <rect x="-12" y="-10" width="24" height="2" fill="#fde68a" opacity="0.4" />
      <rect x="-8" y="-2" width="16" height="8" fill="#64748b" />
    </g>

    <!-- Outer Metallic Shell -->
    <circle cx="64" cy="72" r="54" fill="url(#casePremium)" stroke="#1e293b" stroke-width="2" />
    
    <!-- Inner Bezel Detail -->
    <circle cx="64" cy="72" r="48" fill="none" stroke="#94a3b8" stroke-width="1.5" opacity="0.7" />

    <!-- Radar Screen -->
    <circle cx="64" cy="72" r="44" fill="url(#screenPremium)" stroke="#064e3b" stroke-width="2.5" />

    <!-- Grid lines (High contrast for icons) -->
    <g stroke="#065f46" stroke-width="1.5" opacity="0.4" fill="none">
      <circle cx="64" cy="72" r="14" />
      <circle cx="64" cy="72" r="28" />
      <!-- Vertical/Horizontal Cross -->
      <line x1="64" y1="28" x2="64" y2="116" />
      <line x1="20" y1="72" x2="108" y2="72" />
    </g>

    <!-- LARGE CENTRAL HOME ICON (The Signal) -->
    <g transform="translate(64, 72)" filter="url(#signalGlow)">
      <!-- Amber House shape scaled for FAB visibility -->
      <!-- Adjusted house path for better clarity in the circle -->
      <path d="M0 -22 L-20 0 L-20 20 L20 20 L20 0 Z" fill="#fbbf24" stroke="#92400e" stroke-width="3" stroke-linejoin="round" />
      <!-- Small doorway (negative space feel using darker green) -->
      <rect x="-6" y="8" width="12" height="12" fill="#064e3b" rx="1.5" />
    </g>

    <!-- Extra Radar Points (Found Balls) -->
    <g fill="#fbbf24" filter="url(#signalGlow)" opacity="0.8">
      <circle cx="95" cy="50" r="4.5" />
      <circle cx="35" cy="95" r="3.5" />
    </g>

    <!-- Glass Surface Reflection (Highlight) -->
    <path d="M35 45 Q64 30 93 50" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.3" />
    <circle cx="98" cy="98" r="4" fill="#ffffff" opacity="0.1" />
  </g>
</svg>
