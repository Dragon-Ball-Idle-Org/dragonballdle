packages:
  - '.'

allowBuilds:
  '@parcel/watcher': true
  '@sentry/cli': true
  '@swc/core': true
  esbuild: true
  sharp: true
  supabase: true
  unrs-resolver: true

ignoredBuiltDependencies:
